server {
    server_name sierranft.org www.sierranft.org;
    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sierranft.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sierranft.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.sierranft.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = sierranft.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sierranft.org www.sierranft.org;
    return 404; # managed by Certbot




}